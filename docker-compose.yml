services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
  api:
    build: ./apps/api
    env_file: .env
    depends_on:
      - mongo
  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
    depends_on:
      - api
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
volumes:
  mongo-data:
